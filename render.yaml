# Render.com deployment manifest
# Use with: New → Web Service → Deploy an existing image from a registry
# Image URL: ghcr.io/<your-github-user>/<your-repo-name>

services:
  - type: web
    name: hospital-readmission-api
    runtime: docker
    # Set this to your GHCR image URL after first deploy
    # dockerImage: ghcr.io/<owner>/<repo>:latest
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
